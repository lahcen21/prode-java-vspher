version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: vsphere-proxy-db
    environment:
      MYSQL_DATABASE: vsphere_db
      MYSQL_ROOT_PASSWORD: verysecret
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vsphere-proxy-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/vsphere_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=verysecret
      - ENCRYPTION_HOST_KEY=NgCloud-Secure-Key-2026